name: Build Desktop App

on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
          name: "League of Workouts ${{ github.ref_name }}"
          generate_release_notes: false
          body: |
            ## Téléchargement

            Installez l'application sur **Windows 10 / 11**.

            1. Téléchargez le fichier `.exe` ci-dessous
            2. Lancez l'installeur et suivez les étapes
            3. Connectez-vous avec votre compte League of Workouts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
